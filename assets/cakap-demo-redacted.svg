<svg xmlns='http://www.w3.org/2000/svg' width='720' height='520' viewBox='0 0 720 520' role='img' aria-labelledby='title desc'>
  <title id='title'>Cakap Telegram Translation Bot Demo</title>
  <desc id='desc'>Sanitized Telegram-style demo showing Cakap translating English to Indonesian and Indonesian to English. Personal identifiers are replaced with generic labels.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#78b889'/>
      <stop offset='100%' stop-color='#c5d56f'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='2' stdDeviation='2' flood-color='#000000' flood-opacity='0.18'/>
    </filter>
  </defs>

  <rect width='720' height='520' fill='url(#bg)'/>

  <g opacity='0.16' stroke='#2c7b50' stroke-width='2' fill='none'>
    <circle cx='82' cy='120' r='24'/>
    <circle cx='250' cy='90' r='18'/>
    <circle cx='640' cy='130' r='30'/>
    <path d='M130 270 q35 -30 70 0 t70 0'/>
    <path d='M430 85 l45 30 l-45 30 z'/>
    <path d='M535 300 q42 -38 84 0 t84 0'/>
    <path d='M75 420 l55 -25 l35 45 l-65 10 z'/>
  </g>

  <rect x='0' y='0' width='720' height='70' fill='#ffffff' filter='url(#shadow)'/>
  <circle cx='38' cy='35' r='23' fill='#ef6c45'/>
  <text x='38' y='42' text-anchor='middle' font-family='Arial, sans-serif' font-size='20' font-weight='700' fill='#ffffff'>C</text>
  <text x='76' y='30' font-family='Arial, sans-serif' font-size='18' font-weight='700' fill='#222222'>Cakap</text>
  <text x='76' y='53' font-family='Arial, sans-serif' font-size='14' fill='#666666'>bot</text>
  <text x='660' y='43' text-anchor='middle' font-family='Arial, sans-serif' font-size='24' fill='#777777'>⌕</text>
  <text x='695' y='43' text-anchor='middle' font-family='Arial, sans-serif' font-size='24' fill='#777777'>⋮</text>

  <rect x='318' y='240' rx='16' ry='16' width='84' height='34' fill='#8fbf72' opacity='0.85'/>
  <text x='360' y='263' text-anchor='middle' font-family='Arial, sans-serif' font-size='15' font-weight='700' fill='#ffffff'>Today</text>

  <g font-family='Arial, sans-serif'>
    <rect x='570' y='284' rx='14' ry='14' width='124' height='34' fill='#efffdf'/>
    <text x='586' y='307' font-size='17' fill='#222222'>/start</text>
    <text x='666' y='307' font-size='12' fill='#5a9e53'>15:57 ✓✓</text>

    <rect x='590' y='330' rx='14' ry='14' width='104' height='34' fill='#efffdf'/>
    <text x='606' y='353' font-size='17' fill='#222222'>hello</text>
    <text x='666' y='353' font-size='12' fill='#5a9e53'>15:57 ✓✓</text>

    <rect x='20' y='382' rx='12' ry='12' width='178' height='82' fill='#ffffff' filter='url(#shadow)'/>
    <rect x='32' y='394' rx='4' ry='4' width='148' height='36' fill='#f8e2ef'/>
    <rect x='32' y='394' width='4' height='36' fill='#d64a8b'/>
    <text x='44' y='410' font-size='13' font-weight='700' fill='#d64a8b'>User</text>
    <text x='44' y='426' font-size='13' fill='#222222'>hello</text>
    <text x='34' y='448' font-size='16' fill='#222222'>🇮🇩 Indonesian:</text>
    <text x='34' y='468' font-size='18' fill='#222222'>halo</text>
    <text x='160' y='468' font-size='12' fill='#777777'>15:57</text>

    <rect x='515' y='420' rx='14' ry='14' width='179' height='36' fill='#efffdf'/>
    <text x='531' y='444' font-size='17' fill='#222222'>sudah makan?</text>
    <text x='666' y='444' font-size='12' fill='#5a9e53'>15:57 ✓✓</text>

    <rect x='20' y='470' rx='12' ry='12' width='218' height='82' fill='#ffffff' filter='url(#shadow)' transform='translate(0 -6)'/>
    <rect x='32' y='476' rx='4' ry='4' width='188' height='36' fill='#f8e2ef'/>
    <rect x='32' y='476' width='4' height='36' fill='#d64a8b'/>
    <text x='44' y='492' font-size='13' font-weight='700' fill='#d64a8b'>User</text>
    <text x='44' y='508' font-size='13' fill='#222222'>sudah makan?</text>
    <text x='34' y='530' font-size='16' fill='#222222'>🇬🇧 English:</text>
    <text x='34' y='550' font-size='18' fill='#222222'>Have you eaten?</text>
    <text x='200' y='550' font-size='12' fill='#777777'>15:57</text>
  </g>
</svg>
